#Colour Customization
highlight:
  light: "#0F26A5"
  dark: "#FAE56F"
white: "#F0F0F0"
black: "#050505"

#Image Customization
header-image: "/assets/misc/pluto.png"
contact-image: "/assets/misc/map-image.png"

#Font Awesome icon for portfolio grid when an item is hovered over
portfolio-icon: bi bi-plus-circle-fill

# Add custom fonts
fonts_urls:
    - "https://fonts.googleapis.com/css?family=Montserrat:400,700"
    - "https://fonts.googleapis.com/css?family=Kaushan+Script"
    - "https://fonts.googleapis.com/css?family=Droid+Serif:400,700,400italic,700italic"
    - "https://fonts.googleapis.com/css?family=Roboto+Slab:400,100,300,700"

# Set custom fonts
fonts:
  - name: "Montserrat"
    for: "heading"
  - name: "Kaushan Script"
    for: "script"
  - name: "Droid Serif"
    for: "serif"
  - name: "Roboto Slab"
    for: "body"
